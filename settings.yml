name: Maison Lumière
tagline: Fine costume jewellery, made to last longer than the trend.
about: Maison Lumière designs fashion jewellery for people who want the look of fine jewellery without the formality. Every piece is hand-finished in small batches and built on solid brass or stainless cores, so it holds its shine far longer than typical costume pieces.
